services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wealthfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wealthfolio}
      POSTGRES_DB: ${POSTGRES_DB:-wealthfolio}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wealthfolio}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-wealthfolio}:${POSTGRES_PASSWORD:-wealthfolio}@db:5432/${POSTGRES_DB:-wealthfolio}?sslmode=disable
      PORT: "8080"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID in .env}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?set GOOGLE_CLIENT_SECRET in .env}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:?set GOOGLE_REDIRECT_URL in .env}
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL in .env}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    environment:
      DOMAIN: ${DOMAIN:-:80}
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data

volumes:
  db_data:
  caddy_data:
